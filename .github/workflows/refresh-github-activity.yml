name: Refresh GitHub Activity

on:
  workflow_dispatch:
  schedule:
    - cron: '25 18 * * *'
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch GitHub contribution data
        run: npm run fetch:github
        env:
          GH_CONTRIBUTIONS_TOKEN: ${{ secrets.GH_CONTRIBUTIONS_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_CONTRIBUTIONS_USER: Swa-ne

      - name: Validate build
        run: npm run build

      - name: Commit refreshed contribution data
        run: |
          if [ -z "$(git status --porcelain public/github-contributions.json)" ]; then
            echo "GitHub contribution data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/github-contributions.json
          git commit -m "chore: refresh github activity [skip ci]"
          git push
